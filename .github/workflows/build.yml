name: build
on:
  push:
    branches:
      - '*'         # matches every branch that doesn't contain a '/'
      - '*/*'       # matches every branch containing a single '/'
      - '**'        # matches every branch
      - '!master'   # excludes master
      - '!dev'   # excludes master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      # Lint shell scripts
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master

      - name: Build image
        run: docker build . --tag hls-sentinel

      - name: Sync lasrc_aux
        run: |
          mkdir ./lasrc_aux
          aws s3 sync s3://hls-github-laads-bucket/lasrc_aux/ ./lasrc_aux --quiet

      - name: Run image
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2

        run: docker run -v ${GITHUB_WORKSPACE}/lasrc_aux/:/lasrc_aux \
          --env-file ./testenv -e LASRC_AUX_DIR=/lasrc_aux -e AWS_ACCESS_KEY_ID \
          -e AWS_SECRET_ACCESS_KEY -e AWS_DEFAULT_REGION hls-sentinel 
